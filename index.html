<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>PDF Diff Viewer</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: "Segoe UI", system-ui, sans-serif;
				background: #0f172a;
				color: #e2e8f0;
				display: flex;
				flex-direction: column;
				height: 100vh;
				overflow: hidden;
			}

			/* ── Header ─────────────────────────────────────── */
			header {
				flex-shrink: 0;
				display: flex;
				align-items: center;
				gap: 12px;
				padding: 10px 20px;
				background: #1e293b;
				border-bottom: 1px solid #334155;
			}
			header h1 {
				font-size: 1.05rem;
				font-weight: 600;
			}
			.badge {
				font-size: 0.68rem;
				background: #0f3460;
				border: 1px solid #2563eb;
				border-radius: 4px;
				padding: 2px 7px;
				color: #93c5fd;
			}

			/* ── Controls ───────────────────────────────────── */
			.controls {
				flex-shrink: 0;
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 8px 20px;
				background: #1e293b;
				border-bottom: 1px solid #334155;
				flex-wrap: wrap;
			}
			.file-group {
				display: flex;
				flex-direction: column;
				gap: 3px;
			}
			.file-group label {
				font-size: 0.68rem;
				font-weight: 600;
				letter-spacing: 0.06em;
				text-transform: uppercase;
			}
			.file-group label.lbl-old {
				color: #fbbf24;
			}
			.file-group label.lbl-new {
				color: #60a5fa;
			}
			.file-btn {
				position: relative;
				display: flex;
				align-items: center;
				gap: 6px;
				padding: 6px 12px;
				background: #0f172a;
				border: 1.5px dashed #475569;
				border-radius: 6px;
				cursor: pointer;
				font-size: 0.78rem;
				color: #94a3b8;
				min-width: 180px;
				transition:
					border-color 0.15s,
					background 0.15s;
			}
			.file-btn:hover {
				border-color: #64748b;
				background: #1e293b;
			}
			.file-btn input {
				position: absolute;
				inset: 0;
				opacity: 0;
				cursor: pointer;
			}
			.file-btn .fname {
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				max-width: 140px;
			}

			.sync-toggle {
				display: flex;
				align-items: center;
				gap: 5px;
				font-size: 0.76rem;
				color: #94a3b8;
				cursor: pointer;
				user-select: none;
			}
			.sync-toggle input {
				accent-color: #2563eb;
				cursor: pointer;
			}

			#compareBtn {
				padding: 7px 20px;
				background: linear-gradient(135deg, #2563eb, #1d4ed8);
				border: none;
				border-radius: 6px;
				color: #fff;
				font-size: 0.84rem;
				font-weight: 600;
				cursor: pointer;
				transition:
					opacity 0.15s,
					transform 0.1s;
			}
			#compareBtn:hover:not(:disabled) {
				opacity: 0.88;
				transform: translateY(-1px);
			}
			#compareBtn:disabled {
				opacity: 0.35;
				cursor: not-allowed;
			}

			#status {
				font-size: 0.78rem;
				color: #64748b;
				min-width: 100px;
			}
			#status.err {
				color: #f87171;
			}

			/* ── Main layout ────────────────────────────────── */
			.main-area {
				flex: 1;
				display: flex;
				overflow: hidden;
			}

			.pane {
				flex: 1;
				display: flex;
				flex-direction: column;
				overflow: auto;
				background: #0f172a;
			}
			.pane + .pane {
				border-left: 2px solid #334155;
			}

			.pane-header {
				position: sticky;
				top: 0;
				z-index: 10;
				padding: 6px 14px;
				font-size: 0.7rem;
				font-weight: 700;
				text-transform: uppercase;
				letter-spacing: 0.07em;
			}
			.pane-header.old {
				background: #1c1400;
				color: #fbbf24;
				border-bottom: 1px solid #2a1f00;
			}
			.pane-header.new {
				background: #00112a;
				color: #60a5fa;
				border-bottom: 1px solid #001a3d;
			}

			.pages {
				display: flex;
				flex-direction: column;
				align-items: center;
				padding: 16px 12px;
				gap: 14px;
			}
			.page-wrap {
				box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
				border-radius: 3px;
				overflow: hidden;
				background: #fff;
			}
			.page-wrap img {
				display: block;
				width: 100%;
				height: auto;
			}

			/* ── Changes panel ──────────────────────────────── */
			.changes-panel {
				width: 280px;
				flex-shrink: 0;
				display: flex;
				flex-direction: column;
				background: #1e293b;
				border-left: 1px solid #334155;
				overflow: hidden;
			}
			.panel-header {
				padding: 10px 14px;
				font-size: 0.78rem;
				font-weight: 700;
				text-transform: uppercase;
				letter-spacing: 0.06em;
				color: #94a3b8;
				border-bottom: 1px solid #334155;
				display: flex;
				align-items: center;
				gap: 8px;
			}
			.panel-header .count {
				background: #2563eb;
				color: #fff;
				font-size: 0.68rem;
				padding: 1px 7px;
				border-radius: 10px;
				font-weight: 700;
			}
			.search-box {
				padding: 8px 14px;
				border-bottom: 1px solid #334155;
			}
			.search-box input {
				width: 100%;
				padding: 6px 10px;
				background: #0f172a;
				border: 1px solid #475569;
				border-radius: 5px;
				color: #e2e8f0;
				font-size: 0.78rem;
				outline: none;
			}
			.search-box input::placeholder {
				color: #64748b;
			}
			.search-box input:focus {
				border-color: #2563eb;
			}

			.changes-list {
				flex: 1;
				overflow-y: auto;
				padding: 6px 0;
			}

			.change-item {
				padding: 8px 14px;
				cursor: pointer;
				border-bottom: 1px solid #1e293b;
				transition: background 0.1s;
				font-size: 0.76rem;
				line-height: 1.4;
			}
			.change-item:hover {
				background: #334155;
			}
			.change-item.active {
				background: #1e3a5f;
				border-left: 3px solid #2563eb;
			}

			.change-item .change-badge {
				display: inline-block;
				font-size: 0.62rem;
				font-weight: 700;
				padding: 1px 5px;
				border-radius: 3px;
				text-transform: uppercase;
				margin-right: 6px;
			}
			.change-badge.del {
				background: rgba(248, 113, 113, 0.2);
				color: #fca5a5;
			}
			.change-badge.add {
				background: rgba(74, 222, 128, 0.2);
				color: #86efac;
			}
			.change-badge.mod {
				background: rgba(251, 191, 36, 0.2);
				color: #fde68a;
			}

			.change-item .change-page {
				font-size: 0.65rem;
				color: #64748b;
				margin-left: 4px;
			}
			.change-item .change-text {
				display: block;
				margin-top: 3px;
				color: #94a3b8;
				font-size: 0.72rem;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.change-text .old-t {
				color: #fca5a5;
				text-decoration: line-through;
			}
			.change-text .new-t {
				color: #86efac;
			}
		</style>
	</head>
	<body>
		<header>
			<h1>📄 PDF Diff Viewer</h1>
			<span class="badge">Text Comparison</span>
		</header>

		<div class="controls">
			<div class="file-group">
				<label class="lbl-old">Old PDF</label>
				<div class="file-btn">
					<span>📂</span
					><span class="fname" id="nameOld">Choose file…</span>
					<input type="file" id="inOld" accept="application/pdf" />
				</div>
			</div>
			<div class="file-group">
				<label class="lbl-new">New PDF</label>
				<div class="file-btn">
					<span>📂</span
					><span class="fname" id="nameNew">Choose file…</span>
					<input type="file" id="inNew" accept="application/pdf" />
				</div>
			</div>

			<label class="sync-toggle">
				<input type="checkbox" id="syncScroll" checked /> Scroll Sync
			</label>

			<button id="compareBtn" disabled>Compare</button>
			<span id="status"></span>
		</div>

		<div class="main-area">
			<div class="pane" id="paneOld">
				<div class="pane-header old">Old Version</div>
				<div class="pages" id="pagesOld"></div>
			</div>
			<div class="pane" id="paneNew">
				<div class="pane-header new">New Version</div>
				<div class="pages" id="pagesNew"></div>
			</div>

			<div class="changes-panel">
				<div class="panel-header">
					Changes <span class="count" id="changeCount">0</span>
				</div>
				<div class="search-box">
					<input
						type="text"
						id="searchInput"
						placeholder="Search changes…"
					/>
				</div>
				<div class="changes-list" id="changesList"></div>
			</div>
		</div>

		<script>
			const API = "http://localhost:8000/text-diff";

			const inOld = document.getElementById("inOld");
			const inNew = document.getElementById("inNew");
			const btn = document.getElementById("compareBtn");
			const stat = document.getElementById("status");
			const paneOld = document.getElementById("paneOld");
			const paneNew = document.getElementById("paneNew");

			// ── File inputs ───────────────────────────────────
			function wire(input, nameEl) {
				input.addEventListener("change", () => {
					nameEl.textContent = input.files[0]?.name ?? "Choose file…";
					btn.disabled = !(inOld.files[0] && inNew.files[0]);
				});
			}
			wire(inOld, document.getElementById("nameOld"));
			wire(inNew, document.getElementById("nameNew"));

			// ── Scroll sync ───────────────────────────────────
			const syncCheck = document.getElementById("syncScroll");
			let syncing = false;

			[paneOld, paneNew].forEach((src, i) => {
				const target = i === 0 ? paneNew : paneOld;
				src.addEventListener("scroll", () => {
					if (!syncCheck.checked || syncing) return;
					syncing = true;
					const pct =
						src.scrollTop /
						(src.scrollHeight - src.clientHeight || 1);
					target.scrollTop =
						pct * (target.scrollHeight - target.clientHeight || 1);
					requestAnimationFrame(() => (syncing = false));
				});
			});

			// ── Compare ───────────────────────────────────────
			let allChanges = [];

			btn.addEventListener("click", async () => {
				btn.disabled = true;
				clearAll();

				try {
					setStatus("Uploading & comparing…");

					const fd = new FormData();
					fd.append("old_pdf", inOld.files[0]);
					fd.append("new_pdf", inNew.files[0]);

					const res = await fetch(API, { method: "POST", body: fd });
					if (!res.ok) {
						const body = await res
							.json()
							.catch(() => ({ detail: res.statusText }));
						throw new Error(body.detail ?? res.statusText);
					}
					const data = await res.json();

					setStatus("Rendering…");
					for (const pg of data.pages) {
						appendImg(
							document.getElementById("pagesOld"),
							pg.old_img,
						);
						appendImg(
							document.getElementById("pagesNew"),
							pg.new_img,
						);
					}

					allChanges = data.changes || [];
					renderChangesList(allChanges);
					setStatus("");
				} catch (e) {
					setStatus("Error: " + e.message, true);
					console.error(e);
				} finally {
					btn.disabled = false;
				}
			});

			// ── Changes panel ─────────────────────────────────
			function renderChangesList(changes) {
				const list = document.getElementById("changesList");
				const count = document.getElementById("changeCount");
				list.innerHTML = "";
				count.textContent = changes.length;

				changes.forEach((c, i) => {
					const div = document.createElement("div");
					div.className = "change-item";
					div.dataset.idx = i;

					const kindLabel =
						c.kind === "del"
							? "Deleted"
							: c.kind === "add"
								? "Added"
								: "Modified";

					let textPreview = "";
					if (c.kind === "del") {
						textPreview = `<span class="old-t">${esc(c.old_text)}</span>`;
					} else if (c.kind === "add") {
						textPreview = `<span class="new-t">${esc(c.new_text)}</span>`;
					} else {
						textPreview = `<span class="old-t">${esc(c.old_text)}</span> → <span class="new-t">${esc(c.new_text)}</span>`;
					}

					div.innerHTML = `
					<span class="change-badge ${c.kind}">${kindLabel}</span>
					<span class="change-page">Page ${c.page + 1}</span>
					<span class="change-text">${textPreview}</span>
				`;

					div.addEventListener("click", () => jumpToChange(c, div));
					list.appendChild(div);
				});
			}

			function jumpToChange(change, el) {
				document
					.querySelectorAll(".change-item")
					.forEach((x) => x.classList.remove("active"));
				el.classList.add("active");

				[paneOld, paneNew].forEach((pane) => {
					const pages = pane.querySelector(".pages");
					if (!pages) return;
					const imgs = pages.querySelectorAll(".page-wrap");
					if (imgs.length === 0) return;
					const pageImg = imgs[change.page];
					if (!pageImg) return;

					const pageTop = pageImg.offsetTop - pages.offsetTop;
					const pageH = pageImg.offsetHeight;
					const targetY =
						pageTop + pageH * change.y_pct - pane.clientHeight / 3;

					syncing = true;
					pane.scrollTop = Math.max(0, targetY);
					setTimeout(() => (syncing = false), 100);
				});
			}

			// Search
			document
				.getElementById("searchInput")
				.addEventListener("input", (e) => {
					const q = e.target.value.toLowerCase().trim();
					if (!q) {
						renderChangesList(allChanges);
						return;
					}
					renderChangesList(
						allChanges.filter(
							(c) =>
								c.old_text.toLowerCase().includes(q) ||
								c.new_text.toLowerCase().includes(q),
						),
					);
				});

			// ── Helpers ───────────────────────────────────────
			function appendImg(container, b64) {
				const wrap = document.createElement("div");
				wrap.className = "page-wrap";
				const img = document.createElement("img");
				img.src = "data:image/png;base64," + b64;
				wrap.appendChild(img);
				container.appendChild(wrap);
			}

			function clearAll() {
				document.getElementById("pagesOld").innerHTML = "";
				document.getElementById("pagesNew").innerHTML = "";
				document.getElementById("changesList").innerHTML = "";
				document.getElementById("changeCount").textContent = "0";
				document.getElementById("searchInput").value = "";
				allChanges = [];
			}

			function setStatus(msg, isErr = false) {
				stat.textContent = msg;
				stat.className = isErr ? "err" : "";
			}

			function esc(s) {
				const d = document.createElement("div");
				d.textContent = s;
				return d.innerHTML;
			}
		</script>
	</body>
</html>
